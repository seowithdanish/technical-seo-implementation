<!DOCTYPE html>
<html lang="en">
<head>
  <title>SEO Implementation Example</title>

  <!-- Canonical URL -->
  <link rel="canonical" href="https://example.com/primary-page/" />

  <!-- Example of alternate version -->
  <meta name="robots" content="index, follow" />
</head>
<body>
  <h1>Canonical Implementation Example</h1>
  <p>This demonstrates proper canonical tag usage to prevent duplicate content issues.</p>
</body>
</html>
